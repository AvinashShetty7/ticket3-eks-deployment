name: MERN CI Pipeline

on:
  push:
    branches:
      - main
    paths-ignore:
      - "README.md"
      - "docs/**"
      - "helm/**"
      - "k8s/**"


env:
  REGISTRY: docker.io
  FRONTEND_IMAGE: avi03/frontimage1
  BACKEND_IMAGE: avi03/backendimage1

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.TOKEN }}

      - name: Set Image Tag
        id: tag
        run: |
          echo "TAG=${{ github.run_id}}" >> $GITHUB_ENV

      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build Frontend Image
        run: |
          docker build  -t ${REGISTRY}/${FRONTEND_IMAGE}:${TAG} ./frontend

      - name: Build Backend Image
        run: |
          docker build -t ${REGISTRY}/${BACKEND_IMAGE}:${TAG} ./backend

      - name: Push Frontend Image
        run: |
          docker push ${REGISTRY}/${FRONTEND_IMAGE}:${TAG}

      - name: Push Backend Image
        run: |
          docker push ${REGISTRY}/${BACKEND_IMAGE}:${TAG}

      - name: Update Helm values.yaml
        run: |
          sed -i "s/tag:.*/tag: ${TAG}/" helm/ticket3-chart/values.yaml

      - name: Commit Helm Update
        run: |
          git config --global user.email "avinashshetty2004@gmail.com"
          git config --global user.name "Avi"
          git add helm/ticket3-chart/values.yaml
          git commit -m "Update image tag to ${TAG}"
          git push