apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend-deployment
  labels:
    app: backend-deployment
spec:
  replicas: 2
  selector:
    matchLabels:
      app: backend-deployment
  template:
    metadata:
      labels:
        app: backend-deployment
    spec:
      containers:
      - name: backend-deployment
        image: avi03/backendimage1:v1
        ports:
        - containerPort: 3000
        env:
        - name: MONGODB
          valueFrom:
            configMapKeyRef:
              name: configmap-ticket # The ConfigMap this value comes from.
              key: MONGODB # The key to fetch.
        - name: DB_NAME
          valueFrom:
            configMapKeyRef:
              name: configmap-ticket
              key: DB_NAME
        - name: JWT_SECRET
          valueFrom:
            configMapKeyRef:
              name: configmap-ticket # The ConfigMap this value comes from.
              key: JWT_SECRET # The key to fetch.
        - name: PORT
          valueFrom:
            configMapKeyRef:
              name: configmap-ticket
              key: PORT