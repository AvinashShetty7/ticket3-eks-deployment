apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: ingress-ticket
spec:
  ingressClassName: nginx
  rules:
  - http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: my-front-service
            port:
              number: 80
      - path: /api
        pathType: Prefix
        backend:
          service:
            name: my-back-service
            port:
              number: 80
